<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUPR Nights · PickleBee by 71</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#e9efe9; --surface:#f4f8f3; --surface-2:#eef3ed;
  --lime:#a8d600; --lime-deep:#8bb800;
  --pink:#ff2e9a; --cyan:#12cccc; --orange:#ff8f00;
  --ink:#1c2a1f; --muted:#6b7d6e;
  --clay:7px 7px 18px rgba(60,80,55,.18),-7px -7px 16px rgba(255,255,255,.9);
  --clay-in:inset 4px 4px 9px rgba(60,80,55,.16),inset -4px -4px 9px rgba(255,255,255,.85);
  --clay-sm:4px 4px 11px rgba(60,80,55,.16),-4px -4px 10px rgba(255,255,255,.85);
  --r:26px; --r-sm:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Nunito',sans-serif;color:var(--ink);padding:24px 16px 60px;min-height:100vh;
  background:radial-gradient(circle at 12% 8%,rgba(168,214,0,.10),transparent 40%),
    radial-gradient(circle at 88% 92%,rgba(18,204,204,.10),transparent 42%),var(--bg);
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1080px;margin:0 auto;}
header{text-align:center;margin-bottom:30px;}
.logo{width:108px;height:108px;object-fit:contain;background:var(--surface);border-radius:50%;
  box-shadow:var(--clay);padding:14px;margin:0 auto 18px;display:block;}
.eyebrow{font-family:'Fredoka',sans-serif;font-weight:600;letter-spacing:.5px;color:var(--cyan);
  text-transform:uppercase;font-size:.82rem;margin-bottom:4px;}
h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(1.7rem,4.5vw,2.7rem);line-height:1.05;}
h1 .hl{color:var(--pink);}

/* screens */
.screen{display:none;animation:rise .4s ease both;}
.screen.active{display:block;}
@keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

/* category cards */
.grid{display:grid;gap:20px;margin-top:26px;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--clay);padding:24px 22px 22px;
  cursor:pointer;position:relative;overflow:hidden;border:3px solid transparent;
  transition:transform .18s ease,box-shadow .18s ease;}
.card:hover{transform:translateY(-4px);}
.card:active{transform:translateY(0);box-shadow:var(--clay-in);}
.card .bar{position:absolute;top:0;left:0;right:0;height:7px;}
.card[data-accent=lime] .bar{background:var(--lime);}
.card[data-accent=pink] .bar{background:var(--pink);}
.card[data-accent=cyan] .bar{background:var(--cyan);}
.card[data-accent=orange] .bar{background:var(--orange);}
.card .cat{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.32rem;margin-bottom:10px;margin-top:4px;}
.card .meta{font-size:.95rem;color:var(--muted);font-weight:600;line-height:1.55;}
.card .meta b{color:var(--ink);}
.card .rule{display:inline-block;margin-top:12px;font-size:.78rem;font-weight:700;
  padding:5px 12px;border-radius:20px;background:var(--surface-2);box-shadow:var(--clay-sm);color:var(--ink);}
.card .spots{margin-top:16px;display:flex;align-items:center;justify-content:space-between;}
.spots .left{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.05rem;}
.spots .left b{font-size:1.5rem;color:var(--lime-deep);}
.hurry{background:var(--pink);color:#fff;font-weight:800;font-size:.78rem;padding:6px 12px;
  border-radius:14px;box-shadow:var(--clay-sm);animation:pulse 1.3s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.card.full{cursor:not-allowed;opacity:.85;} .card.full:hover{transform:none;}
.full-msg{margin-top:16px;background:var(--surface-2);box-shadow:var(--clay-in);
  border-radius:var(--r-sm);padding:12px 14px;text-align:center;font-weight:700;color:var(--muted);font-size:.92rem;}
.who-btn{width:100%;margin-top:12px;font-family:'Fredoka',sans-serif;font-weight:600;
  font-size:.85rem;letter-spacing:.03em;color:var(--muted);
  background:var(--surface-2);box-shadow:var(--clay-sm);border:none;
  border-radius:var(--r-sm);padding:11px 10px;cursor:pointer;transition:all .15s ease;}
.who-btn:hover{color:var(--ink);background:#e3edda;transform:translateY(-1px);}

/* ═══ HIVE RANKINGS NAV BAR (fixed bottom — PC + Mobile) ═══ */

/* Always fixed at the bottom regardless of viewport */
/* ═══ HIVE RANKINGS CARD ═══ */
.lb-card{
  background:var(--surface);border-radius:var(--r);
  padding:24px 22px;margin-bottom:24px;
  position:relative;cursor:pointer;
  /* Flex column: centers title + subtitle + message as one group vertically */
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;min-height:160px;
  animation:lbBreath 3.5s ease-in-out infinite;
}
.lb-card::before{
  content:'';position:absolute;inset:-3px;border-radius:calc(var(--r) + 3px);
  background:linear-gradient(135deg,#6a00f4,#0d0d6b,#9c00e4,#1a0066,#7f00ff,#000080);
  background-size:300% 300%;
  animation:lbShift 4s ease-in-out infinite,lbStrobe 2.8s ease-in-out infinite;
  z-index:0;
}
.lb-card::after{
  content:'';position:absolute;inset:0;border-radius:var(--r);
  background:var(--surface);z-index:1;
}
.lb-card>*{position:relative;z-index:2;}
@keyframes lbShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
@keyframes lbStrobe{0%,100%{opacity:1;}45%{opacity:.65;}50%{opacity:.5;}55%{opacity:.65;}}
@keyframes lbBreath{
  0%,100%{box-shadow:0 0 0 0 transparent,var(--clay);}
  50%{box-shadow:0 0 28px 6px rgba(106,0,244,.28),var(--clay);}
}
.lb-card h2{font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.5rem;margin-bottom:4px;}
.lb-card .lbmeta{color:var(--muted);font-weight:700;font-size:.88rem;margin-bottom:16px;}
/* Purple CTA pill — standalone inside the card, no overlay needed */
.lb-cta-pill{font-family:'Fredoka',sans-serif;font-weight:700;
  font-size:1.05rem;color:#fff;text-align:center;
  padding:14px 28px;
  background:linear-gradient(135deg,rgba(106,0,244,.85),rgba(0,0,100,.7));
  border:2px solid rgba(200,100,255,.65);border-radius:18px;
  letter-spacing:.04em;text-shadow:0 0 16px rgba(200,100,255,.9);
  animation:ctaPulse 2.2s ease-in-out infinite;}
@keyframes ctaPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}

/* ── Drawer content ── */
/* Search box */
.lb-search-wrap{padding-bottom:14px;}
.lb-search{width:100%;font-family:'Nunito',sans-serif;font-weight:700;font-size:.95rem;
  color:var(--ink);padding:12px 14px;border:none;border-radius:var(--r-sm);
  background:var(--surface-2);box-shadow:var(--clay-in);outline:none;}
/* List item layout */
.lb-name{flex:1;}
.lb-pts{font-family:'Fredoka',sans-serif;font-weight:600;font-size:.88rem;
  color:var(--muted);white-space:nowrap;margin-left:6px;}
/* Separator line between toppers and the rest */
.lb-sep{height:2px;background:linear-gradient(90deg,transparent,var(--surface-2),transparent);
  padding:0 !important;border-bottom:none !important;margin:6px 0;pointer-events:none;}
.lb-pause-msg{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.05rem;
  color:var(--orange);text-align:center;padding:18px 0;line-height:1.5;
  animation:fadepulse 2s ease-in-out infinite;}
.lb-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:560px){.lb-cols{grid-template-columns:1fr;}}
.lb-col h3{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.05rem;
  margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--surface-2);}
.lb-col h3.girls{color:var(--pink);}.lb-col h3.boys{color:var(--cyan);}
.lb-list{list-style:none;}
.lb-list li{display:flex;gap:10px;align-items:center;padding:7px 0;
  border-bottom:1px solid var(--surface-2);font-weight:700;font-size:.95rem;}
.lb-list li:last-child{border-bottom:none;}
.lb-rank{font-family:'Fredoka',sans-serif;font-weight:600;color:var(--muted);
  min-width:26px;text-align:right;font-size:.85rem;}
.lb-rank.gold{color:#d4a017;}.lb-rank.silver{color:#8a8a8a;}.lb-rank.bronze{color:#b97b4a;}
.lb-empty{color:var(--muted);font-weight:700;font-size:.92rem;padding:12px 0;font-style:italic;}

/* Bottom drawer (hidden until open) */
.lb-drawer-overlay{
  position:fixed;inset:0;background:rgba(28,42,31,.52);
  backdrop-filter:blur(4px);z-index:98;
  opacity:0;pointer-events:none;transition:opacity .35s ease;
}
.lb-drawer-overlay.show{opacity:1;pointer-events:auto;}
.lb-drawer{
  position:fixed;bottom:0;left:0;right:0;z-index:99;
  background:var(--surface);
  border-radius:26px 26px 0 0;
  box-shadow:0 -10px 50px rgba(60,80,55,.22);
  max-height:88vh;display:flex;flex-direction:column;
  transform:translateY(102%);transition:transform .4s cubic-bezier(.25,.8,.25,1);
}
.lb-drawer.open{transform:translateY(0);}
.lb-drawer-handle-bar{
  width:50px;height:5px;border-radius:3px;
  background:var(--surface-2);margin:14px auto 2px;flex-shrink:0;
}
.lb-drawer-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px 12px;flex-shrink:0;
  border-bottom:1px solid var(--surface-2);
}
.lb-drawer-title{font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.25rem;}
.lb-drawer-close{
  border:none;background:var(--surface-2);box-shadow:var(--clay-sm);
  border-radius:10px;padding:7px 12px;cursor:pointer;
  font-family:'Fredoka',sans-serif;font-weight:600;font-size:.9rem;color:var(--muted);
}
.lb-drawer-close:hover{background:var(--surface);}
.lb-drawer-body{overflow-y:auto;padding:18px 20px 40px;flex:1;-webkit-overflow-scrolling:touch;}
/* Single-column list inside the drawer */
.lb-drawer-body .lb-cols{grid-template-columns:1fr;}
.lb-drawer-body .lb-col h3{font-size:1.1rem;margin-top:8px;}
/* Who's Playing drawer additions */
.wp-topbar-right{display:flex;align-items:center;gap:8px;}
.wp-reload{border:none;background:var(--surface-2);box-shadow:var(--clay-sm);
  border-radius:10px;padding:7px 12px;cursor:pointer;
  font-family:'Fredoka',sans-serif;font-weight:600;font-size:.85rem;color:var(--ink);
  display:flex;align-items:center;gap:5px;}
.wp-reload:hover{background:var(--surface);}
.wp-reload.spin .wp-reload-icon{animation:wpSpin .6s linear;}
@keyframes wpSpin{from{transform:rotate(0);}to{transform:rotate(360deg);}}
.wp-slotcount{font-family:'Fredoka',sans-serif;font-weight:600;font-size:.9rem;
  color:var(--muted);margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid var(--surface-2);}
.wp-list{list-style:none;}
.wp-list li{padding:11px 4px;border-bottom:1px solid var(--surface-2);font-weight:700;font-size:.95rem;}
.wp-list li:last-child{border-bottom:none;}
.wp-list li .wp-num{color:var(--lime-deep);font-family:'Fredoka',sans-serif;font-weight:600;margin-right:8px;}
/* Site footer credit */
.site-footer{text-align:center;padding:20px 16px 24px;font-size:.78rem;
  font-weight:700;color:var(--muted);opacity:.75;}

/* form */
.panel{background:var(--surface);border-radius:var(--r);box-shadow:var(--clay);padding:28px 24px;margin-top:8px;}
.back{background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;
  color:var(--cyan);font-size:.95rem;margin-bottom:14px;display:inline-flex;align-items:center;gap:6px;}
.panel h2{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.5rem;}
.panel .sched{color:var(--muted);font-weight:700;margin:6px 0 22px;line-height:1.5;}
.field{margin-bottom:18px;}
.field label{display:block;font-weight:800;font-size:.92rem;margin-bottom:8px;color:var(--ink);}
.field .opt{color:var(--muted);font-weight:600;font-size:.82rem;}
input[type=text],input[type=number]{width:100%;font-family:'Nunito',sans-serif;font-size:1rem;
  font-weight:600;color:var(--ink);padding:14px 16px;border:none;border-radius:var(--r-sm);
  background:var(--surface-2);box-shadow:var(--clay-in);outline:none;}
input::placeholder{color:#9fb0a1;font-weight:600;}
.seg{display:flex;gap:10px;}
.seg button{flex:1;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;padding:13px 8px;
  border:none;border-radius:var(--r-sm);cursor:pointer;background:var(--surface-2);
  box-shadow:var(--clay-sm);color:var(--muted);transition:all .15s ease;}
.seg button.sel{color:#fff;box-shadow:var(--clay-in);}
.seg button.sel[data-c=lime]{background:var(--lime-deep);}
.seg button.sel[data-c=pink]{background:var(--pink);}
.seg button.sel[data-c=cyan]{background:var(--cyan);}
.seg button.sel[data-c=orange]{background:var(--orange);}
.file-btn{display:flex;align-items:center;gap:12px;cursor:pointer;background:var(--surface-2);
  box-shadow:var(--clay-in);border-radius:var(--r-sm);padding:14px 16px;font-weight:700;color:var(--muted);}
.file-btn .ic{width:38px;height:38px;flex:none;border-radius:11px;background:var(--cyan);
  box-shadow:var(--clay-sm);display:grid;place-items:center;color:#fff;font-size:1.3rem;font-weight:700;}
.file-btn.has{color:var(--ink);} .file-btn.has .ic{background:var(--lime-deep);}
input[type=file]{display:none;}
.err{color:var(--pink);font-weight:800;font-size:.85rem;margin-top:7px;display:none;}
.err.show{display:block;}
/* Name autocomplete dropdown */
.ac-field{position:relative;}
.ac-list{position:absolute;left:0;right:0;top:100%;margin-top:6px;z-index:40;
  background:var(--surface);border-radius:var(--r-sm);box-shadow:var(--clay);
  max-height:220px;overflow-y:auto;display:none;padding:6px;}
.ac-list.show{display:block;}
.ac-item{padding:11px 14px;border-radius:11px;cursor:pointer;font-weight:700;
  font-size:.95rem;color:var(--ink);display:flex;align-items:center;justify-content:space-between;
  gap:10px;transition:background .12s ease;}
.ac-item:hover,.ac-item.active{background:var(--surface-2);}
.ac-item .ac-g{font-size:.72rem;font-weight:800;padding:3px 9px;border-radius:9px;flex:none;}
.ac-item .ac-g.M{background:#e1f0ff;color:#2266cc;}
.ac-item .ac-g.F{background:#ffe1ef;color:var(--pink);}
.ac-empty{padding:11px 14px;color:var(--muted);font-weight:600;font-size:.88rem;font-style:italic;}
.submit{width:100%;font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.2rem;color:#fff;
  padding:17px;border:none;border-radius:var(--r);cursor:pointer;margin-top:8px;
  background:linear-gradient(135deg,var(--lime),var(--lime-deep));box-shadow:var(--clay);
  transition:all .15s ease;}
.submit:hover:not(:disabled){transform:translateY(-2px);}
.submit:disabled{background:var(--surface-2);color:#a8b8aa;box-shadow:var(--clay-in);cursor:not-allowed;}

/* overlay */
.overlay{position:fixed;inset:0;background:rgba(233,239,233,.85);backdrop-filter:blur(6px);
  display:none;place-items:center;z-index:50;}
.overlay.show{display:grid;}
.loadbox{background:var(--surface);border-radius:var(--r);box-shadow:var(--clay);
  padding:36px 30px;width:min(420px,90vw);text-align:center;}
.dots{display:flex;gap:10px;justify-content:center;margin-bottom:18px;}
.dots span{width:15px;height:15px;border-radius:50%;background:var(--cyan);box-shadow:var(--clay-sm);
  animation:bounce 1s infinite ease-in-out;}
.dots span:nth-child(2){background:var(--pink);animation-delay:.15s;}
.dots span:nth-child(3){background:var(--lime-deep);animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.6;}40%{transform:translateY(-10px);opacity:1;}}
.loadbox.done .dots span{animation:none;background:var(--lime-deep);opacity:1;}
.loadbox.error .dots span{animation:none;background:var(--pink);opacity:1;}
.loadbox .msg{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.3rem;margin-bottom:20px;}
.track{background:var(--surface-2);box-shadow:var(--clay-in);border-radius:20px;height:18px;overflow:hidden;}
.fill{height:100%;width:0%;border-radius:20px;background:linear-gradient(90deg,var(--cyan),var(--lime));transition:width .1s linear;}
.loadbox.done .fill{background:linear-gradient(90deg,var(--lime),var(--lime-deep));}
.err-msg{color:var(--pink);font-weight:800;margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="./picklebee-logo.png" class="logo" alt="PickleBee by 71" onerror="this.style.display='none'">
    <div class="eyebrow">DUPR Nights — Season 2</div>
    <h1 id="welcome">Welcome to the <span class="hl">HIVE</span></h1>
  </header>

  <!-- SCREEN A: categories + leaderboard -->
  <section id="screenSelect" class="screen active">
    <div id="leaderboardSection"></div>
    <div class="grid" id="catGrid"></div>
  </section>

  <!-- SCREEN B: registration form -->
  <section id="screenForm" class="screen">
    <div class="panel">
      <button class="back" onclick="goSelect()">‹ Back to events</button>
      <h2 id="formTitle"></h2>
      <p class="sched" id="formSched"></p>
      <div id="formFields"></div>
      <p class="err" id="tierErr"></p>
      <button class="submit" id="submitBtn" disabled onclick="submitEntry()">Reserve my spot</button>
    </div>
  </section>
</div>

<footer class="site-footer">Designed and Developed by Z2H Design Studio x RealSolutions</footer>

<!-- Loading overlay -->
<div class="overlay" id="overlay">
  <div class="loadbox" id="loadbox">
    <div class="dots" id="loadDots"><span></span><span></span><span></span></div>
    <div class="msg" id="loadMsg">Reserving your spot at the HIVE</div>
    <div class="track"><div class="fill" id="fill"></div></div>
    <p class="err-msg" id="loadErr"></p>
  </div>
</div>

<script>
/* ============================================================
   PASTE YOUR APPS SCRIPT /exec URL HERE
   ============================================================ */
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzeZaUXvfqsA1oVqwwnSxdn_JJrYnCJQ5-3vA0-TCJSjMZUP2tRMEl-PawqlxZ5opGbXg/exec";

/* ---- week anchor (must match Code.gs) ---- */
const WEEK14_START = new Date(2026, 5, 13); // Sat 13 Jun 2026

/* ---- category definitions ---- */
const CATS = {
  action_doubles: {
    label:'ACTION BEE · Doubles', type:'doubles', accent:'orange',
    day:'Mon', offset:2, time:'7:30 PM onwards',
    rule:'DUPR below 3.600', tierMax:3.600, tierStrict:true, ex:'3.000', sinceWeek:17,
  },
  mixed_doubles: {
    label:'MIXED BEE · Doubles', type:'mixed', accent:'pink',
    day:'Tue', offset:3, time:'8:00 PM - 10:30 PM',
    rule:'Open to all', ex:'3.000',
  },
  newbee_doubles: {
    label:'NEW BEE · Doubles', type:'doubles', accent:'lime',
    day:'Wed', offset:4, time:'7:00 PM - 9:15 PM',
    rule:'DUPR 3.050 & below', tierMax:3.050, ex:'2.725',
  },
  stinger_doubles: {
    label:'STINGER BEE · Doubles', type:'doubles', accent:'cyan',
    day:'Wed', offset:4, time:'9:30 PM - 11:30 PM',
    rule:'DUPR 3.051 & above', tierMin:3.051, ex:'3.250',
  },
  newbee_singles: {
    label:'NEW BEE · Singles', type:'singles', accent:'lime',
    day:'Thu', offset:5, time:'7:00 PM - 8:15 PM',
    rule:'DUPR 3.050 & below', tierMax:3.050, ex:'2.725',
  },
  stinger_singles: {
    label:'STINGER BEE · Singles', type:'singles', accent:'cyan',
    day:'Thu', offset:5, time:'8:30 PM onwards',
    rule:'DUPR 3.051 & above', tierMin:3.051, ex:'3.250',
  },
};

let WEEK = 14;

// Computes the current DUPR week directly from the clock.
// Used by the leaderboard subtitle so it's accurate even when
// loadLeaderboard() resolves before loadSlots() sets WEEK.
function lbWeek(){
  return 14+Math.floor((Date.now()-WEEK14_START.getTime())/(7*24*60*60*1000));
}
let slots = {};
let current = null;
const form = {};
let PLAYER_DIRECTORY = []; // {name, gender} from Points - Overall, for name autocomplete

/* ---- date helpers ---- */
function dayDate(week, offset){
  const d = new Date(WEEK14_START);
  d.setDate(d.getDate() + (week-14)*7 + offset);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function nowInColombo(){
  return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Colombo'}));
}
function eventCutoff(week, offset){
  const d = new Date(WEEK14_START);
  d.setDate(d.getDate() + (week-14)*7 + offset);
  d.setHours(16,30,0,0);
  return d;
}
function isLocked(c){ return nowInColombo().getTime() > eventCutoff(WEEK, c.offset).getTime(); }

/* ---- load slot counts + leaderboard on open ---- */
async function loadSlots(){
  // PERF: 10-second timeout on initial load
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), 10000);
  try{
    const res = await fetch(BACKEND_URL, {signal: ctrl.signal});
    clearTimeout(timer);
    const data = await res.json();
    WEEK = data.week;
    slots = data;
    document.getElementById('welcome').innerHTML =
      `Welcome to the <span class="hl">Week ${WEEK}</span> of DUPR at PickleBee by 71`;
    renderCards();
  }catch(e){
    document.getElementById('catGrid').innerHTML =
      '<div class="full-msg">Couldn\'t load events. Please refresh in a moment.</div>';
  }
}
async function loadLeaderboard(){
  try{
    const res = await fetch(BACKEND_URL+'?action=leaderboard');
    const data = await res.json();
    renderLeaderboard(data);
  }catch(e){ renderLeaderboard({ok:true,girls:[],boys:[]}); }
}

/* ---- render category cards ---- */
function renderCards(){
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  Object.keys(CATS).forEach(key=>{
    const c = CATS[key];
    // sinceWeek guard — hide categories not yet launched
    if(c.sinceWeek && WEEK < c.sinceWeek) return;
    const s = slots[key] || { left:c_limit(key), limit:c_limit(key) };
    const left = s.left;
    const locked = isLocked(c);
    const full = left <= 0;
    const hurry = !locked && left > 0 && left <= 3;
    const card = document.createElement('div');
    card.className = 'card' + ((full || locked) ? ' full' : '');
    card.setAttribute('data-accent', c.accent);
    card.innerHTML = `
      <div class="bar"></div>
      <div class="cat">${c.label}</div>
      <div class="meta"><b>${c.day} · ${dayDate(WEEK,c.offset)}</b><br>${c.time}</div>
      <div class="rule">${c.rule}</div>
      ${locked ? '<div class="full-msg">See you next week!</div>'
        : full ? '<div class="full-msg">Sorry, no slots left! see you next week!</div>'
        : `<div class="spots">
             <div class="left"><b>${left}</b> ${left===1?'spot':'spots'} left</div>
             ${hurry?'<div class="hurry">Hurry! Only '+left+' left</div>':''}
           </div>`}
      <button class="who-btn" onclick="event.stopPropagation();openWhoPlaying('${key}')">SEE WHO IS PLAYING</button>`;
    if(!full && !locked) card.onclick = ()=>openForm(key);
    grid.appendChild(card);
  });
}
function c_limit(key){ return ({mixed_doubles:6}[key])||12; }

/* ── Leaderboard nav bar JS ── */

function renderLeaderboard(data){
  const sec = document.getElementById('leaderboardSection');
  const wk  = lbWeek();
  let cardInner, drawerContent;

  if(data && data.paused){
    cardInner = `<div class="lb-pause-msg">Please hang tight, we are currently updating your rankings!</div>`;
    drawerContent = cardInner;
  } else if(!data || (!data.girls.length && !data.boys.length)){
    cardInner = `<div class="lb-empty">Rankings will appear once the season gets underway.</div>`;
    drawerContent = cardInner;
  } else {
    const ri = n => n===1?'gold':n===2?'silver':n===3?'bronze':'';
    const gc = data.girlsCutoff||12, bc = data.boysCutoff||36;

    // Build a section list with rank, name, points and a separator at the cutoff
    const buildList = (players, cutoff) => {
      if(!players.length) return '<div class="lb-empty">No rankings yet.</div>';
      const items = players.map((p,i)=>{
        const sep = i===cutoff ? '<li class="lb-sep" aria-hidden="true"></li>' : '';
        return sep+`<li data-name="${p.name.toLowerCase()}">
          <span class="lb-rank ${ri(i+1)}">${i+1}</span>
          <span class="lb-name">${p.name}</span>
          <span class="lb-pts">${p.points}</span>
        </li>`;
      }).join('');
      return `<ul class="lb-list">${items}</ul>`;
    };

    const rankingsHtml = `<div class="lb-cols">
      <div class="lb-col"><h3 class="girls">Queens</h3>${buildList(data.girls,gc)}</div>
      <div class="lb-col"><h3 class="boys">Kings</h3>${buildList(data.boys,bc)}</div>
    </div>`;
    cardInner    = `<div class="lb-cta-pill">CLICK HERE TO VIEW YOUR RANK!</div>`;
    drawerContent = `<div class="lb-search-wrap">
      <input class="lb-search" type="text" placeholder="Search your name…" oninput="filterLbSearch(this.value)">
    </div>${rankingsHtml}`;
  }

  sec.innerHTML = `<div class="lb-card" onclick="openLbDrawer()">
    <h2>HIVE Rankings</h2>
    <div class="lbmeta">Standings as of Week ${wk}</div>
    ${cardInner}
  </div>`;

  const db = document.getElementById('lbDrawerBody');
  if(db) db.innerHTML = `<div style="margin-bottom:14px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.1rem;">Standings as of Week ${wk}</div>${drawerContent}`;
}


function openLbDrawer(){

  document.getElementById('lbDrawer').classList.add('open');

  drawer._tsEnd = e => { if(e.changedTouches[0].clientY - _ty > 70) closeLbDrawer(); };
  drawer.addEventListener('touchstart', drawer._tsStart, {passive:true});
  drawer.addEventListener('touchend', drawer._tsEnd, {passive:true});

function closeLbDrawer(){

  drawer.classList.remove('open');

/* ---- build form fields ---- */
function buildFields(c){
  const box = document.getElementById('formFields');
  const duprLabel = c.type==='singles' ? 'Singles DUPR Rating' : 'Doubles DUPR Rating';
  const ex = c.ex || '3.000';
  let html = `
    <div class="field ac-field">

      <input type="text" id="nameInput" autocomplete="off" placeholder="e.g. Vibuda Jayathilake"
        onkeydown="acKeyNav(event,'name')"

        onfocus="acShow('name',this.value)" onblur="acHideDelayed('name')">
      <div class="ac-list" id="acList-name"></div>
    </div>
    <div class="field">
      <label>${duprLabel}</label>
      <input type="number" step="0.001" placeholder="e.g. ${ex}" onkeydown="enterNext(event,this)" oninput="setVal('dupr',this.value)">
    </div>
    <div class="field">
      <label>Gender</label>
      <div class="seg" id="segGender">
        <button type="button" data-c="cyan" onclick="pick(this,'gender','M')">Male</button>
        <button type="button" data-c="pink" onclick="pick(this,'gender','F')">Female</button>
      </div>
    </div>`;
  if(c.type !== 'singles'){
    html += `
    <div class="field ac-field">
      <label>Partner's Name</label>
      <input type="text" id="partnerNameInput" autocomplete="off" placeholder="Partner full name"
        onkeydown="acKeyNav(event,'partnerName')"
        oninput="setVal('partnerName',this.value); acShow('partnerName',this.value)"
        onfocus="acShow('partnerName',this.value)" onblur="acHideDelayed('partnerName')">
      <div class="ac-list" id="acList-partnerName"></div>
    </div>
    <div class="field">
      <label>Partner's Gender</label>
      <div class="seg" id="segPartnerGender">
        <button type="button" data-c="cyan" onclick="pick(this,'partnerGender','M')">Male</button>
        <button type="button" data-c="pink" onclick="pick(this,'partnerGender','F')">Female</button>
      </div>
    </div>
    <div class="field">
      <label>Partner's DUPR Rating <span class="opt">(optional)</span></label>
      <input type="number" step="0.001" placeholder="Leave blank if unknown" onkeydown="enterNext(event,this)" oninput="setVal('partnerDupr',this.value)">

      <label>Payment</label>
      <div class="seg">
        <button type="button" data-c="lime" onclick="pick(this,'payBoth',false)">Paying for one</button>

/* ---- field handlers ---- */
function setVal(k,v){ form[k]=v; validate(); }
function pick(btn,k,v){
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel'); form[k]=v; validate();
}
function pickFile(input){
  const f=input.files[0]; if(!f) return;
  form._file=f;
  document.getElementById('fileLabel').textContent=f.name;
  document.getElementById('fileBtn').classList.add('has');
  validate();
}
function enterNext(event,el){
  if(event.key!=='Enter') return; event.preventDefault();
  const inputs=Array.from(document.querySelectorAll('#formFields input[type=text],#formFields input[type=number]'));
  const i=inputs.indexOf(el);
  if(i>-1&&i<inputs.length-1)inputs[i+1].focus(); else el.blur();
}

/* ============================================================
   NAME AUTOCOMPLETE — suggests names already in the season's
   player directory (Points - Overall) to reduce typo-driven
   duplicate entries that fragment a player's points.
   ============================================================ */
async function loadPlayerDirectory(){
  try{
    const res=await fetch(BACKEND_URL+'?action=playerDirectory');
    const data=await res.json();
    if(data&&data.ok&&Array.isArray(data.players)) PLAYER_DIRECTORY=data.players;
  }catch(e){ /* silent — autocomplete is a convenience, not a requirement */ }
}

// field: 'name' or 'partnerName'
const _acActiveIndex={name:-1,partnerName:-1};

function acMatches(query){
  const q=query.trim().toLowerCase();
  if(!q) return [];
  const starts=[], contains=[];
  PLAYER_DIRECTORY.forEach(p=>{
    const n=p.name.toLowerCase();
    if(n.startsWith(q)) starts.push(p);
    else if(n.includes(q)) contains.push(p);
  });
  // Prefix matches first, then substring matches, capped at 6 results
  return starts.concat(contains).slice(0,6);
}

function acShow(field,query){
  const list=document.getElementById('acList-'+field);
  if(!list) return;
  const matches=acMatches(query);
  _acActiveIndex[field]=-1;
  if(matches.length===0){ list.classList.remove('show'); list.innerHTML=''; return; }
  list.innerHTML=matches.map((p,i)=>
    `<div class="ac-item" data-i="${i}" onmousedown="acSelect('${field}',${i})">
       <span>${p.name}</span><span class="ac-g ${p.gender}">${p.gender}</span>
     </div>`).join('');
  list._matches=matches;
  list.classList.add('show');
}

function acHideDelayed(field){
  // Delay so a click on an item (onmousedown) registers before the dropdown vanishes
  setTimeout(()=>{
    const list=document.getElementById('acList-'+field);
    if(list) list.classList.remove('show');
  },150);
}

function acSelect(field,index){
  const list=document.getElementById('acList-'+field);
  const p=list&&list._matches&&list._matches[index];
  if(!p) return;
  const inputId=field==='name'?'nameInput':'partnerNameInput';
  const input=document.getElementById(inputId);
  if(input) input.value=p.name;
  setVal(field,p.name);

  // Auto-fill gender (still editable — just pre-selects the toggle)
  const genderKey=field==='name'?'gender':'partnerGender';
  const segId=field==='name'?'segGender':'segPartnerGender';
  const seg=document.getElementById(segId);
  if(seg){
    const btn=Array.from(seg.querySelectorAll('button'))
      .find(b=>b.getAttribute('onclick').includes(`'${p.gender}'`));
    if(btn) pick(btn,genderKey,p.gender);
  }
  list.classList.remove('show');
}

// Keyboard navigation: Up/Down to move through suggestions, Enter to select
function acKeyNav(event,field){
  const list=document.getElementById('acList-'+field);
  const open=list&&list.classList.contains('show');
  if(!open){ enterNext(event,event.target); return; }

  const items=Array.from(list.querySelectorAll('.ac-item'));
  if(event.key==='ArrowDown'){
    event.preventDefault();
    _acActiveIndex[field]=Math.min(_acActiveIndex[field]+1,items.length-1);
    items.forEach((it,i)=>it.classList.toggle('active',i===_acActiveIndex[field]));
  }else if(event.key==='ArrowUp'){
    event.preventDefault();
    _acActiveIndex[field]=Math.max(_acActiveIndex[field]-1,0);
    items.forEach((it,i)=>it.classList.toggle('active',i===_acActiveIndex[field]));
  }else if(event.key==='Enter'){
    if(_acActiveIndex[field]>-1){
      event.preventDefault();
      acSelect(field,_acActiveIndex[field]);
    }else{
      list.classList.remove('show');
      enterNext(event,event.target);
    }
  }else if(event.key==='Escape'){
    list.classList.remove('show');
  }
}

/* ---- live validation ---- */
function validate(){
  const c=CATS[current]; if(!c) return;
  const btn=document.getElementById('submitBtn');
  const errEl=document.getElementById('tierErr');
  errEl.classList.remove('show');
  let ok=form.name&&form.dupr&&form.gender&&form._file;
  if(c.type!=='singles') ok=ok&&form.partnerName&&form.partnerGender&&(form.payBoth!==undefined);

  // DUPR tier block (tierStrict = strictly below tierMax)
  const r=parseFloat(form.dupr);
  if(form.dupr&&!isNaN(r)){
    if(c.tierMax!==undefined){
      const blocked=c.tierStrict?(r>=c.tierMax):(r>c.tierMax);
      if(blocked){
        errEl.textContent=c.tierStrict
          ?'This category requires DUPR below '+c.tierMax+'. Yours is '+r+'.'
          :'This category is for DUPR '+c.tierMax+' & below. Yours is '+r+'.';
        errEl.classList.add('show'); ok=false;
      }
    }
    if(c.tierMin!==undefined&&r<c.tierMin){
      errEl.textContent='This category is for DUPR '+c.tierMin+' & above. Yours is '+r+'.';
      errEl.classList.add('show'); ok=false;
    }
  }
  btn.disabled=!ok;
}

/* ============================================================
   PERF: Image compression before base64 encoding.
   Images → max 1200px, 80% JPEG quality (~100-300KB).
   PDFs → passed through unchanged.
   ============================================================ */
async function compressImage(file){
  if(!file.type.startsWith('image/')) return file; // PDFs pass through
  return new Promise((res)=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      try{
        const MAX=1200, scale=Math.min(1,MAX/img.width);
        const canvas=document.createElement('canvas');
        canvas.width=Math.round(img.width*scale);
        canvas.height=Math.round(img.height*scale);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob=>{
          if(!blob){res(file);return;}
          res(new File([blob],file.name.replace(/\.[^.]+$/,'.jpg'),{type:'image/jpeg'}));
        },'image/jpeg',0.80);
      }catch(e){URL.revokeObjectURL(url);res(file);}
    };
    img.onerror=()=>{URL.revokeObjectURL(url);res(file);};
    img.src=url;
  });
}

/* ---- submit ---- */
async function submitEntry(){
  const btn=document.getElementById('submitBtn');
  // PERF: submit guard — disable immediately, show compression message
  btn.disabled=true;
  btn.textContent='Preparing your slip...';

  let file=form._file;
  try{ file=await compressImage(file); }catch(e){ /* fallback to original */ }

  showOverlay();
  const base64=await fileToBase64(file);

  const payload={
    category:current, name:form.name, dupr:form.dupr, gender:form.gender,
    partnerName:form.partnerName||'', partnerGender:form.partnerGender||'',
    partnerDupr:form.partnerDupr||'', payingForBoth:form.payBoth===true,
    fileBase64:base64, fileName:file.name, mimeType:file.type,
  };

  const [,result]=await Promise.all([animateBar(2000),postEntry(payload)]);

  // Restore button regardless of outcome
  btn.textContent='Reserve my spot';
  validate(); // re-enables if fields still valid

  if(result&&result.ok){
    finishSuccess();
    if(result.slots) slots=result.slots;
  }else{
    finishError(result&&result.error?result.error:'Something went wrong. Please try again.');
  }
}

async function postEntry(payload){
  // PERF: 30-second timeout with friendly message
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),30000);
  try{
    const res=await fetch(BACKEND_URL,{method:'POST',body:JSON.stringify(payload),signal:ctrl.signal});
    clearTimeout(timer);
    return await res.json();
  }catch(e){
    clearTimeout(timer);
    if(e.name==='AbortError')
      return {ok:false,error:'Taking too long — check your connection and try again.'};
    return {ok:false,error:'Network error. Check your connection and try again.'};
  }
}

/* ---- overlay animation ---- */
function showOverlay(){
  const box=document.getElementById('loadbox');
  box.classList.remove('done','error');
  document.getElementById('loadMsg').textContent='Reserving your spot at the HIVE';
  document.getElementById('loadErr').textContent='';
  document.getElementById('fill').style.width='0%';
  document.getElementById('overlay').classList.add('show');
}
function animateBar(ms){
  return new Promise(res=>{
    const fill=document.getElementById('fill'); let p=0;
    const t=setInterval(()=>{ p++; fill.style.width=p+'%'; if(p>=100){clearInterval(t);res();}},ms/100);
  });
}
function finishSuccess(){
  const box=document.getElementById('loadbox');
  box.classList.add('done');
  document.getElementById('loadMsg').textContent='Spot Reserved at the HIVE';
  setTimeout(()=>{ document.getElementById('overlay').classList.remove('show'); goSelect(); renderCards(); },1000);
}
function finishError(msg){
  const box=document.getElementById('loadbox');
  box.classList.add('error');
  document.getElementById('loadMsg').textContent='Could not reserve';
  document.getElementById('loadErr').textContent=msg;
  setTimeout(()=>document.getElementById('overlay').classList.remove('show'),2500);
}

/* ---- helpers ---- */
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej; r.readAsDataURL(file);
  });
}
function switchScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function goSelect(){ switchScreen('screenSelect'); }

loadSlots();
loadLeaderboard();
loadPlayerDirectory();
