<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUPR Nights · PickleBee by 71</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ⚙️  PASTE YOUR BACKEND URL — see the <script> at the bottom.
   ============================================================ */

:root{
  /* Light claymorphism base */
  --bg:        #e9efe9;
  --surface:   #f4f8f3;
  --surface-2: #eef3ed;

  /* PickleBee neon accents */
  --lime: #a8d600;
  --lime-deep: #8bb800;
  --pink: #ff2e9a;
  --cyan: #12cccc;
  --ink:  #1c2a1f;
  --muted:#6b7d6e;

  /* Clay shadows */
  --clay: 7px 7px 18px rgba(60,80,55,.18), -7px -7px 16px rgba(255,255,255,.9);
  --clay-in: inset 4px 4px 9px rgba(60,80,55,.16), inset -4px -4px 9px rgba(255,255,255,.85);
  --clay-sm: 4px 4px 11px rgba(60,80,55,.16), -4px -4px 10px rgba(255,255,255,.85);

  --r: 26px;
  --r-sm: 16px;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{
  font-family:'Nunito',sans-serif;
  background:
    radial-gradient(circle at 12% 8%, rgba(168,214,0,.10), transparent 40%),
    radial-gradient(circle at 88% 92%, rgba(18,204,204,.10), transparent 42%),
    var(--bg);
  color:var(--ink);
  min-height:100vh;
  padding:24px 16px 60px;
  -webkit-font-smoothing:antialiased;
}
.wrap{ max-width:1080px; margin:0 auto; }

/* ---------- Header ---------- */
header{ text-align:center; margin-bottom:30px; }
.logo{
  width:108px;height:108px;object-fit:contain;
  background:var(--surface); border-radius:50%;
  box-shadow:var(--clay); padding:14px; margin:0 auto 18px;
  display:block;
}
.eyebrow{
  font-family:'Fredoka',sans-serif; font-weight:600; letter-spacing:.5px;
  color:var(--cyan); text-transform:uppercase; font-size:.82rem; margin-bottom:4px;
}
h1{
  font-family:'Fredoka',sans-serif; font-weight:700;
  font-size:clamp(1.7rem,4.5vw,2.7rem); line-height:1.05; color:var(--ink);
}
h1 .hl{ color:var(--pink); }

/* ---------- Screens ---------- */
.screen{ display:none; animation:rise .4s ease both; }
.screen.active{ display:block; }
@keyframes rise{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;} }

/* ---------- Category grid ---------- */
.grid{
  display:grid; gap:20px; margin-top:26px;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
}
.card{
  background:var(--surface); border-radius:var(--r);
  box-shadow:var(--clay); padding:24px 22px 22px;
  cursor:pointer; position:relative; overflow:hidden;
  transition:transform .18s ease, box-shadow .18s ease;
  border:3px solid transparent;
}
.card:hover{ transform:translateY(-4px); }
.card:active{ transform:translateY(0); box-shadow:var(--clay-in); }
.card .bar{ position:absolute; top:0; left:0; right:0; height:7px; }
.card[data-accent=lime] .bar{ background:var(--lime); }
.card[data-accent=pink] .bar{ background:var(--pink); }
.card[data-accent=cyan] .bar{ background:var(--cyan); }

.card .cat{
  font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.32rem;
  margin-bottom:10px; margin-top:4px;
}
.card .meta{ font-size:.95rem; color:var(--muted); font-weight:600; line-height:1.55; }
.card .meta b{ color:var(--ink); }
.card .rule{
  display:inline-block; margin-top:12px; font-size:.78rem; font-weight:700;
  padding:5px 12px; border-radius:20px; background:var(--surface-2);
  box-shadow:var(--clay-sm); color:var(--ink);
}
.card .spots{
  margin-top:16px; display:flex; align-items:center; justify-content:space-between;
}
.spots .left{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.05rem; }
.spots .left b{ font-size:1.5rem; color:var(--lime-deep); }

.hurry{
  background:var(--pink); color:#fff; font-weight:800; font-size:.78rem;
  padding:6px 12px; border-radius:14px; box-shadow:var(--clay-sm);
  animation:pulse 1.3s ease-in-out infinite;
}
@keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }

.card.full{ cursor:not-allowed; opacity:.85; }
.card.full:hover{ transform:none; }
.full-msg{
  margin-top:16px; background:var(--surface-2); box-shadow:var(--clay-in);
  border-radius:var(--r-sm); padding:12px 14px; text-align:center;
  font-weight:700; color:var(--muted); font-size:.92rem;
}

/* ---------- Form ---------- */
.panel{
  background:var(--surface); border-radius:var(--r);
  box-shadow:var(--clay); padding:28px 24px; margin-top:8px;
}
.back{
  background:none; border:none; cursor:pointer; font-family:'Nunito',sans-serif;
  font-weight:800; color:var(--cyan); font-size:.95rem; margin-bottom:14px;
  display:inline-flex; align-items:center; gap:6px;
}
.panel h2{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.5rem; }
.panel .sched{ color:var(--muted); font-weight:700; margin:6px 0 22px; line-height:1.5; }

.field{ margin-bottom:18px; }
.field label{
  display:block; font-weight:800; font-size:.92rem; margin-bottom:8px; color:var(--ink);
}
.field .opt{ color:var(--muted); font-weight:600; font-size:.82rem; }
input[type=text], input[type=number]{
  width:100%; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:600;
  color:var(--ink); padding:14px 16px; border:none; border-radius:var(--r-sm);
  background:var(--surface-2); box-shadow:var(--clay-in); outline:none;
}
input::placeholder{ color:#9fb0a1; font-weight:600; }

/* segmented toggle (gender / paying) */
.seg{ display:flex; gap:10px; }
.seg button{
  flex:1; font-family:'Nunito',sans-serif; font-weight:800; font-size:.95rem;
  padding:13px 8px; border:none; border-radius:var(--r-sm); cursor:pointer;
  background:var(--surface-2); box-shadow:var(--clay-sm); color:var(--muted);
  transition:all .15s ease;
}
.seg button.sel{ color:#fff; box-shadow:var(--clay-in); }
.seg button.sel[data-c=lime]{ background:var(--lime-deep); }
.seg button.sel[data-c=pink]{ background:var(--pink); }
.seg button.sel[data-c=cyan]{ background:var(--cyan); }

/* file upload */
.file-btn{
  display:flex; align-items:center; gap:12px; cursor:pointer;
  background:var(--surface-2); box-shadow:var(--clay-in); border-radius:var(--r-sm);
  padding:14px 16px; font-weight:700; color:var(--muted);
}
.file-btn .ic{
  width:38px;height:38px;flex:none; border-radius:11px; background:var(--cyan);
  box-shadow:var(--clay-sm); display:grid; place-items:center; color:#fff; font-size:1.2rem;
}
.file-btn.has{ color:var(--ink); }
.file-btn.has .ic{ background:var(--lime-deep); }
input[type=file]{ display:none; }

.err{
  color:var(--pink); font-weight:800; font-size:.85rem; margin-top:7px; display:none;
}
.err.show{ display:block; }

.submit{
  width:100%; font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.2rem;
  color:#fff; padding:17px; border:none; border-radius:var(--r); cursor:pointer;
  background:linear-gradient(135deg,var(--lime),var(--lime-deep));
  box-shadow:var(--clay); margin-top:8px; transition:all .15s ease;
}
.submit:hover:not(:disabled){ transform:translateY(-2px); }
.submit:disabled{
  background:var(--surface-2); color:#a8b8aa; box-shadow:var(--clay-in);
  cursor:not-allowed;
}

/* ---------- Loading overlay ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(233,239,233,.85);
  backdrop-filter:blur(6px); display:none; place-items:center; z-index:50;
}
.overlay.show{ display:grid; }
.loadbox{
  background:var(--surface); border-radius:var(--r); box-shadow:var(--clay);
  padding:36px 30px; width:min(420px,90vw); text-align:center;
}
.loadbox .dots{ display:flex; gap:10px; justify-content:center; margin-bottom:18px; }
.loadbox .dots span{
  width:15px;height:15px;border-radius:50%;background:var(--cyan);
  box-shadow:var(--clay-sm); animation:bounce 1s infinite ease-in-out;
}
.loadbox .dots span:nth-child(2){ background:var(--pink); animation-delay:.15s; }
.loadbox .dots span:nth-child(3){ background:var(--lime-deep); animation-delay:.3s; }
@keyframes bounce{ 0%,80%,100%{transform:translateY(0);opacity:.6;} 40%{transform:translateY(-10px);opacity:1;} }
.loadbox.done .dots span{ animation:none; background:var(--lime-deep); transform:none; opacity:1; }
.loadbox.error .dots span{ animation:none; background:var(--pink); transform:none; opacity:1; }
.loadbox .msg{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.3rem; margin-bottom:20px; }
.track{ background:var(--surface-2); box-shadow:var(--clay-in); border-radius:20px; height:18px; overflow:hidden; }
.fill{ height:100%; width:0%; border-radius:20px;
  background:linear-gradient(90deg,var(--cyan),var(--lime)); transition:width .1s linear; }
.loadbox.done .fill{ background:linear-gradient(90deg,var(--lime),var(--lime-deep)); }
.loadbox .err-msg{ color:var(--pink); font-weight:800; margin-top:6px; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <img src="./picklebee-logo.png" class="logo" alt="PickleBee by 71"
         onerror="this.style.display='none'">
    <div class="eyebrow">DUPR Nights</div>
    <h1 id="welcome">Welcome to the <span class="hl">HIVE</span></h1>
  </header>

  <!-- SCREEN A: choose category -->
  <section id="screenSelect" class="screen active">
    <div class="grid" id="catGrid"><!-- cards injected by JS --></div>
  </section>

  <!-- SCREEN B: registration form -->
  <section id="screenForm" class="screen">
    <div class="panel">
      <button class="back" onclick="goSelect()">‹ Back to events</button>
      <h2 id="formTitle"></h2>
      <p class="sched" id="formSched"></p>
      <div id="formFields"></div>
      <p class="err" id="tierErr"></p>
      <button class="submit" id="submitBtn" disabled onclick="submitEntry()">
        Reserve my spot
      </button>
    </div>
  </section>

</div>

<!-- Loading overlay -->
<div class="overlay" id="overlay">
  <div class="loadbox" id="loadbox">
    <div class="dots" id="loadDots"><span></span><span></span><span></span></div>
    <div class="msg" id="loadMsg">Reserving your spot at the HIVE</div>
    <div class="track"><div class="fill" id="fill"></div></div>
    <p class="err-msg" id="loadErr"></p>
  </div>
</div>

<script>
/* ============================================================
   ⚙️  STEP 1: PASTE YOUR APPS SCRIPT WEB APP URL HERE
   (the long URL ending in /exec from Phase 1, Step 4)
   ============================================================ */
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzeZaUXvfqsA1oVqwwnSxdn_JJrYnCJQ5-3vA0-TCJSjMZUP2tRMEl-PawqlxZ5opGbXg/exec";

/* ---- category definitions (mirror the backend) ---- */
const WEEK14_START = new Date(2026, 5, 13); // Sat 13 Jun 2026 — weeks roll over on Saturdays
const CATS = {
  newbee_doubles:  { label:'NEW BEE · Doubles',   type:'doubles', accent:'lime',
                     day:'Tue', offset:3, time:'9:15 PM onwards', rule:'DUPR 3.050 & below', tierMax:3.050, ex:'2.725' },
  mixed_doubles:   { label:'MIXED BEE · Doubles',  type:'mixed',   accent:'pink',
                     day:'Tue', offset:3, time:'7:00 PM onwards', rule:'Open to all', ex:'3.000' },
  stinger_doubles: { label:'STINGER BEE · Doubles',type:'doubles', accent:'cyan',
                     day:'Wed', offset:4, time:'8:00 PM onwards', rule:'DUPR 3.051 & above', tierMin:3.051, ex:'3.250' },
  newbee_singles:  { label:'NEW BEE · Singles',   type:'singles', accent:'lime',
                     day:'Thu', offset:5, time:'7:00 PM onwards', rule:'DUPR 3.050 & below', tierMax:3.050, ex:'2.725' },
  stinger_singles: { label:'STINGER BEE · Singles',type:'singles', accent:'cyan',
                     day:'Thu', offset:5, time:'8:30 PM onwards', rule:'DUPR 3.051 & above', tierMin:3.051, ex:'3.250' },
};

let WEEK = 14;
let slots = {};
let current = null;           // current category key
const form = {};              // working form values

/* ---- date helpers (match backend) ---- */
function dayDate(week, offset){
  const d = new Date(WEEK14_START);
  d.setDate(d.getDate() + (week-14)*7 + offset);
  return d.toLocaleDateString('en-GB',{ day:'numeric', month:'short', year:'numeric' });
}

/* Current time in Sri Lanka, so the lock behaves the same for every visitor
   regardless of their device's own time zone. */
function nowInColombo(){
  return new Date(new Date().toLocaleString('en-US',{ timeZone:'Asia/Colombo' }));
}
/* The lock moment for a category: 4:30 PM on that category's event date. */
function eventCutoff(week, offset){
  const d = new Date(WEEK14_START);
  d.setDate(d.getDate() + (week-14)*7 + offset);
  d.setHours(16, 30, 0, 0);
  return d;
}
function isLocked(c){
  return nowInColombo().getTime() > eventCutoff(WEEK, c.offset).getTime();
}

/* ---- load slot counts on open ---- */
async function loadSlots(){
  try{
    const res = await fetch(BACKEND_URL);
    const data = await res.json();
    WEEK = data.week;
    slots = data;
    document.getElementById('welcome').innerHTML =
      `Welcome to the <span class="hl">Week ${WEEK}</span> of DUPR at PickleBee by 71`;
    renderCards();
  }catch(e){
    document.getElementById('catGrid').innerHTML =
      `<div class="full-msg">Couldn't load events. Please refresh in a moment.</div>`;
  }
}

/* ---- render the 5 category cards ---- */
function renderCards(){
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  Object.keys(CATS).forEach(key=>{
    const c = CATS[key];
    const s = slots[key] || { left:c_limit(key), limit:c_limit(key) };
    const left = s.left;
    const locked = isLocked(c);
    const full = left <= 0;
    const hurry = !locked && left > 0 && left <= 3;

    const card = document.createElement('div');
    card.className = 'card' + ((full || locked) ? ' full' : '');
    card.setAttribute('data-accent', c.accent);
    card.innerHTML = `
      <div class="bar"></div>
      <div class="cat">${c.label}</div>
      <div class="meta"><b>${c.day} · ${dayDate(WEEK,c.offset)}</b><br>${c.time}</div>
      <div class="rule">${c.rule}</div>
      ${ locked ? `<div class="full-msg">See you next week!</div>`
        : full ? `<div class="full-msg">Sorry, no slots left! see you next week!</div>`
              : `<div class="spots">
                   <div class="left"><b>${left}</b> ${s.limit && left===1?'spot':'spots'} left</div>
                   ${ hurry ? `<div class="hurry">Hurry! Only ${left} left</div>` : '' }
                 </div>` }
    `;
    if(!full && !locked) card.onclick = ()=>openForm(key);
    grid.appendChild(card);
  });
}
function c_limit(key){ return ({mixed_doubles:6}[key]) || 12; }

/* ---- open the form for a category ---- */
function openForm(key){
  current = key;
  const c = CATS[key];
  Object.keys(form).forEach(k=>delete form[k]);   // reset
  document.getElementById('formTitle').textContent = c.label;
  document.getElementById('formSched').innerHTML =
    `${c.day}, ${dayDate(WEEK,c.offset)} · ${c.time}<br>${c.rule}`;
  buildFields(c);
  switchScreen('screenForm');
  validate();
}

/* ---- build the right fields for singles vs doubles ---- */
function buildFields(c){
  const box = document.getElementById('formFields');
  const duprLabel = c.type==='singles' ? 'Singles DUPR Rating' : 'Doubles DUPR Rating';
  const ex = c.ex || '3.000';

  let html = `
    <div class="field">
      <label>Your Name</label>
      <input type="text" placeholder="e.g. Vibuda Jayathilake" onkeydown="enterNext(event,this)" oninput="setVal('name',this.value)">
    </div>
    <div class="field">
      <label>${duprLabel}</label>
      <input type="number" step="0.001" placeholder="e.g. ${ex}" onkeydown="enterNext(event,this)" oninput="setVal('dupr',this.value)">
    </div>
    <div class="field">
      <label>Gender</label>
      <div class="seg">
        <button type="button" data-c="cyan" onclick="pick(this,'gender','M')">Male</button>
        <button type="button" data-c="pink" onclick="pick(this,'gender','F')">Female</button>
      </div>
    </div>`;

  if(c.type!=='singles'){
    html += `
    <div class="field">
      <label>Partner's Name</label>
      <input type="text" placeholder="Partner full name" onkeydown="enterNext(event,this)" oninput="setVal('partnerName',this.value)">
    </div>
    <div class="field">
      <label>Partner's Gender</label>
      <div class="seg">
        <button type="button" data-c="cyan" onclick="pick(this,'partnerGender','M')">Male</button>
        <button type="button" data-c="pink" onclick="pick(this,'partnerGender','F')">Female</button>
      </div>
    </div>
    <div class="field">
      <label>Partner's DUPR Rating <span class="opt">(optional)</span></label>
      <input type="number" step="0.001" placeholder="Leave blank if unknown" onkeydown="enterNext(event,this)" oninput="setVal('partnerDupr',this.value)">
    </div>
    <div class="field">
      <label>Payment</label>
      <div class="seg">
        <button type="button" data-c="lime" onclick="pick(this,'payBoth',false)">Paying for one</button>
        <button type="button" data-c="lime" onclick="pick(this,'payBoth',true)">Paying for both</button>
      </div>
    </div>`;
  }

  html += `
    <div class="field">
      <label>Payment Slip <span class="opt">(image or PDF)</span></label>
      <label class="file-btn" id="fileBtn">
        <span class="ic">+</span>
        <span id="fileLabel">Tap to attach your slip</span>
        <input type="file" accept="image/*,application/pdf" onchange="pickFile(this)">
      </label>
    </div>`;

  box.innerHTML = html;
}

/* ---- field handlers ---- */
function setVal(k,v){ form[k]=v; validate(); }

/* Pressing Enter jumps to the next text/number field in the form. */
function enterNext(event, el){
  if(event.key !== 'Enter') return;
  event.preventDefault();
  const inputs = Array.from(document.querySelectorAll(
    '#formFields input[type=text], #formFields input[type=number]'));
  const i = inputs.indexOf(el);
  if(i > -1 && i < inputs.length - 1) inputs[i+1].focus();
  else el.blur();
}
function pick(btn,k,v){
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  form[k]=v; validate();
}
function pickFile(input){
  const f = input.files[0];
  if(!f) return;
  form._file = f;
  document.getElementById('fileLabel').textContent = f.name;
  document.getElementById('fileBtn').classList.add('has');
  validate();
}

/* ---- live validation: lock submit until valid + tier check ---- */
function validate(){
  const c = CATS[current];
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('tierErr');
  errEl.classList.remove('show');

  let ok = form.name && form.dupr && form.gender && form._file;
  if(c.type!=='singles'){
    ok = ok && form.partnerName && form.partnerGender && (form.payBoth!==undefined);
  }

  // tier validation (block wrong tier)
  const r = parseFloat(form.dupr);
  if(form.dupr && !isNaN(r)){
    if(c.tierMax!==undefined && r > c.tierMax){
      errEl.textContent = `This category is for DUPR ${c.tierMax} & below. Yours is ${r}.`;
      errEl.classList.add('show'); ok=false;
    }
    if(c.tierMin!==undefined && r < c.tierMin){
      errEl.textContent = `This category is for DUPR ${c.tierMin} & above. Yours is ${r}.`;
      errEl.classList.add('show'); ok=false;
    }
  }
  btn.disabled = !ok;
}

/* ---- submit ---- */
async function submitEntry(){
  showOverlay();
  const file = form._file;
  const base64 = await fileToBase64(file);

  const payload = {
    category: current,
    name: form.name,
    dupr: form.dupr,
    gender: form.gender,
    partnerName: form.partnerName || '',
    partnerGender: form.partnerGender || '',
    partnerDupr: form.partnerDupr || '',
    payingForBoth: form.payBoth === true,
    fileBase64: base64,
    fileName: file.name,
    mimeType: file.type,
  };

  // run the 2-second bar and the network call together
  const [ , result ] = await Promise.all([ animateBar(2000), postEntry(payload) ]);

  if(result && result.ok){
    finishSuccess();
    if(result.slots) slots = result.slots;
  }else{
    finishError(result && result.error ? result.error : 'Something went wrong. Please try again.');
  }
}

function postEntry(payload){
  // text/plain keeps it a "simple" request → no CORS preflight with Apps Script
  return fetch(BACKEND_URL, { method:'POST', body: JSON.stringify(payload) })
    .then(r=>r.json())
    .catch(()=>({ ok:false, error:'Network error. Check your connection and try again.' }));
}

/* ---- overlay animation ---- */
function showOverlay(){
  const o=document.getElementById('overlay');
  const box=document.getElementById('loadbox');
  box.classList.remove('done','error');
  document.getElementById('loadMsg').textContent='Reserving your spot at the HIVE';
  document.getElementById('loadErr').textContent='';
  document.getElementById('fill').style.width='0%';
  o.classList.add('show');
}
function animateBar(ms){
  return new Promise(res=>{
    const fill=document.getElementById('fill');
    let p=0; const step=ms/100;
    const t=setInterval(()=>{ p++; fill.style.width=p+'%'; if(p>=100){clearInterval(t);res();} },step);
  });
}
function finishSuccess(){
  const box=document.getElementById('loadbox');
  box.classList.add('done');
  document.getElementById('loadMsg').textContent='Spot Reserved at the HIVE';
  setTimeout(()=>{
    document.getElementById('overlay').classList.remove('show');
    goSelect();
    renderCards();   // refresh counts
  },1000);
}
function finishError(msg){
  const box=document.getElementById('loadbox');
  box.classList.add('error');
  document.getElementById('loadMsg').textContent='Could not reserve';
  document.getElementById('loadErr').textContent=msg;
  setTimeout(()=>{ document.getElementById('overlay').classList.remove('show'); },2200);
}

/* ---- helpers ---- */
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);   // strip data: prefix
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}
function switchScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function goSelect(){ switchScreen('screenSelect'); }

/* ---- init ---- */
loadSlots();
</script>
